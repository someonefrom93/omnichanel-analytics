version: 2

sources:
  - name: bronze
    description: "Raw Otter API data ingested into the Bronze S3 bucket (or local mirror in dev). One JSON file per Otter endpoint per (merchant, target_date, run_timestamp) tuple."
    meta:
      # DEVIATION (PR3a): external_location is set to a full read_json_auto
      # expression because dbt-duckdb's default external_location handling
      # does not wrap the path in read_json_auto. OMCAE_BRONZE_PATH must be
      # set to the full S3 base path (e.g. s3://bucket/prefix) or a local
      # mirror path. No {placeholder} syntax is used here to avoid format_map
      # substitution issues in the adapter.
      external_location: "read_json_auto('{{ env_var('OMCAE_BRONZE_PATH') }}/merchant_id=*/year=*/month=*/day=*/orders-*.json', format='auto')"
    tables:
      - name: orders
        description: "Otter /v1/orders response. Top-level `orders` array (one element per order) with nested `items` array (one element per line item)."
        columns:
          - name: orders
            description: "Array of order objects from the Otter response."
          - name: next_cursor
            description: "Pagination cursor (null in fixtures)."

      - name: reports_enqueue
        description: "Otter POST /v1/reports request bodies (jobId + QUEUED status)."
        meta:
          external_location: "read_json_auto('{{ env_var('OMCAE_BRONZE_PATH') }}/merchant_id=*/year=*/month=*/day=*/reports_enqueue-*.json', format='auto')"
        columns:
          - name: source
            description: "API data source identifier."
          - name: version
            description: "API schema version."
          - name: endpoint
            description: "Otter API endpoint path."
          - name: jobId
            description: "Otter's report job identifier."
          - name: status
            description: "Report job status (QUEUED, etc.)."

      - name: reports_result
        description: "Otter GET /v1/reports/{jobId} response bodies (final report payload with totals)."
        meta:
          external_location: "read_json_auto('{{ env_var('OMCAE_BRONZE_PATH') }}/merchant_id=*/year=*/month=*/day=*/reports_result-*.json', format='auto')"
        columns:
          - name: source
            description: "API data source identifier."
          - name: version
            description: "API schema version."
          - name: endpoint
            description: "Otter API endpoint path."
          - name: status
            description: "Report job status (READY, FAILED, CANCELLED)."
          - name: result
            description: "Nested report payload with period and totals."