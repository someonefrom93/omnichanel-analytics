# openspec/config.yaml — omc-analytics
# Generated by sdd-init on 2026-06-10.
schema: spec-driven

context: |
  Project: omc-analytics (alias) — git remote: omnichanel-analytics (OFAE: Omnichannel Foodservice Analytics Engine).
  Stack: Python 3.12 (ingestion pipeline), dbt-core + dbt-duckdb (transformations), DuckDB (local engine), Apache Parquet (Snappy), AWS S3 Bronze/Silver/Gold (multi-tenant lakehouse), AWS KMS (envelope encryption, AES-256-GCM via `cryptography`), PostgreSQL (metadata + merchant_cogs), Streamlit (serverless UI on AWS App Runner), boto3 (AWS SDK), requests/responses (HTTP mocking).
  Architecture: Medallion (Bronze raw JSON → Silver Parquet cleansed → Gold star-schema marts). Multi-tenant fencing via `merchant_id=[id]` Hive partitions.
  Testing: pytest 9.0.3 + pytest-cov 7.1.0; ruff 0.15.16 (linter), mypy 1.10.0 (types), black 24.4.2 (formatter).
  Style: Strict TDD enabled (RED-GREEN-REFACTOR). Specs use Given/When/Then + RFC 2119 keywords.
  Delivery: interactive execution; ask-always; review budget 400 lines/PR.

rules:
  proposal:
    - Include rollback plan for any change touching S3 paths, KMS keys, or the multi-tenant partition scheme
    - State blast radius per affected tenant and storage tier
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Cover all three observability tiers (user-actionable / aggregator-latency / internal) when touching error handling
  design:
    - Include sequence diagrams for ingestion → KMS → S3 flows and Streamlit → S3 Gold read paths
    - Document data-lineage across Bronze/Silver/Gold with explicit column-level mappings
    - Justify any deviation from the medallion contract
  tasks:
    - Group by phase (scaffold, ingestion, transform, serve, observe), use hierarchical numbering
    - Keep tasks completable in one session and within the 400-line review budget
  apply:
    - Follow existing code patterns; mirror clean/hexagonal layering
    tdd: true
    test_command: "pytest"
  verify:
    test_command: "pytest --cov=src --cov-report=term-missing"
    build_command: "python -m compileall src"
    coverage_threshold: 80
  archive:
    - Warn before merging deltas that touch the Gold star schema or the multi-tenant partition key
    - Always sync dbt model changes into openspec/specs/transformation/spec.md before archive
